server:
  port: 8761

spring:
  application:
    name: eureka-server

eureka:
  instance:
    # Local environment
    # hostname: localhost
    # Cloud environment
    hostname: eureka-server
  client:
    registerWithEureka: false
    fetchRegistry: false
    serviceUrl:
      defaultZone: http://${eureka.instance.hostname}:${server.port}/eureka/
  server:
    wait-time-in-ms-when-sync-empty: 0
